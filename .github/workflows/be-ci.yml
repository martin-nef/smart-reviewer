name: be CI

on:
  pull_request:
    paths:
      - "be/**"
      - ".github/workflows/be-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "be/**"
      - ".github/workflows/be-ci.yml"

defaults:
  run:
    working-directory: be

jobs:
  scan_ruby:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: be
      - name: Brakeman
        run: bin/brakeman --no-pager
      - name: Bundler audit
        run: bin/bundler-audit

  lint:
    runs-on: ubuntu-latest
    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: be
      - name: RuboCop
        run: bin/rubocop -f github

  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://localhost:27017/smart_reviewer_test
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: be
      - name: RSpec
        run: bin/rspec

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          working-directory: be
      - name: Sorbet
        run: bin/srb tc
