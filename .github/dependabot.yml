version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
  - package-ecosystem: docker
    directories:
      - be
      - fe
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
